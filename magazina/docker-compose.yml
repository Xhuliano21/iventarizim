version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: magazina_db
    environment:
      POSTGRES_DB: magazina
      POSTGRES_USER: magazina
      POSTGRES_PASSWORD: magazina123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
volumes:
  pgdata:
